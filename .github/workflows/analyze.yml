name: BTC Technical Analysis

on:
  schedule:
    # Run every hour at minute 17 (primary) and 47 (backup).
    # Two independent cron entries double the chance of GitHub scheduling the
    # run. If both fire, the concurrency group serializes them and the app-level
    # cooldown (4h same-direction) prevents duplicate Telegram messages.
    - cron: '17 * * * *'
    - cron: '47 * * * *'

  # Allow manual trigger for testing without waiting for the schedule
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print Telegram message without sending (true/false)'
        required: false
        default: 'false'
      force:
        description: 'Override cooldown and confidence filters (true/false)'
        required: false
        default: 'false'

# Prevent two runs from committing model updates simultaneously,
# which would cause git push conflicts.
concurrency:
  group: btc-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # Required to commit model and signal history back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git push works correctly
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run BTC analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN_FLAG=""
          FORCE_FLAG=""

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          python src/main.py $DRY_RUN_FLAG $FORCE_FLAG

      - name: Commit updated model and signal history
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions Bot"
          git add data/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update model state and signal history [skip ci]"
            # Pull first to avoid conflicts with concurrent runs (belt + suspenders
            # on top of the concurrency group above)
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
